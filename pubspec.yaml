name: yagamy
description: A new Flutter project.

publish_to: 'none'

version: 0.0.1

environment:
  sdk: '>=2.18.4 <3.0.0'

dependencies:
  firebase_messaging: ^14.6.7
  flutter:
    sdk: flutter
  flutter_gen_runner: ^5.3.1
  flutter_riverpod: ^2.3.6
  flutter_svg: ^2.0.7
  font_awesome_flutter: ^10.5.0
  freezed_annotation: ^2.4.1
  go_router: ^10.0.0
  isar: ^3.0.5
  isar_flutter_libs: ^3.0.5
  json_annotation: ^4.8.1
  mobile_scanner: ^2.0.0
  path_provider: ^2.0.14
  url_launcher: ^6.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  isar_generator: ^3.0.5
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
   - assets/logo/
   - assets/json/
   - assets/project/main_image/
   - assets/project/thumbnail/

flutter_gen:
  integrations:
    flutter_svg: true